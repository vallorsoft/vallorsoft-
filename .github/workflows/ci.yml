name: CI

# Minden PR-en és a main-be való push után lefuttatja a Jest-tesztcsomagot.
# Cél: a néma regressziók (pl. egy fordítás elrontotta a teszteket) már a
# PR-ben kibukjanak, ne élesben.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
