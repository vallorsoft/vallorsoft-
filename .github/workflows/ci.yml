name: CI

# Minden PR-en és a main-be való push után lefuttatja a Jest-tesztcsomagot.
# A DATABASE_URL beállításával a valódi-DB integrációs suite is fut (db-orders.test.js);
# enélkül (helyben) az a suite kihagyódik, a mock-tesztek mennek.
# Main-push után sikeres tesztek esetén automatikusan élesít Render-re
# (RENDER_DEPLOY_HOOK_URL GitHub Secret szükséges — Render → Service → Settings → Deploy Hooks).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest (Node 22 + Postgres 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vstest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vstest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests (mock + valódi DB)
        run: npm test

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret nincs beállítva — Render deploy kihagyva."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."

  # Az ÉLES oldal a Fly.io-n fut (vallorsoft.fly.dev) — minden sikeres main-merge
  # automatikusan élesedjen ott is. Egyszeri teendő: a FLY_API_TOKEN GitHub secret
  # beállítása (Repo → Settings → Secrets and variables → Actions). Token generálás:
  #   fly tokens create deploy   (vagy: fly auth token)
  # Ha a secret nincs beállítva, a lépés kecsesen kihagyódik (nem lesz piros a CI).
  deploy-fly:
    name: Deploy to Fly.io
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN secret nincs beállítva — Fly deploy kihagyva."
            echo "Beállítás: Repo → Settings → Secrets → Actions → FLY_API_TOKEN"
            exit 0
          fi
          flyctl deploy --remote-only
          echo "Fly.io deploy kész."
