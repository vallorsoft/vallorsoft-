<!doctype html>
<html lang="hu"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="title.carrier">VallorSoft — Alvállalkozói portál</title>
<script src="/i18n.js?v=20260614qa"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* === VallorSoft prémium landing-skin (page-scoped, világos B2B) === */
  :root{
    --bg:#f7f9fc;--panel:#ffffff;--tx:#0f172a;--mut:#64748b;
    --blue:#3b82f6;--blue-h:#2563eb;--indigo:#6366f1;
    --ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;--red:#ef4444;
    --bd:#e2e8f0;--r:16px;--rm:12px;--rs:8px;
    --shadow-card:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
    --shadow-hover:0 4px 10px rgba(15,23,42,.06),0 18px 44px rgba(15,23,42,.10);
    --shadow-blue:0 6px 18px rgba(59,130,246,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1100px 560px at 85% -12%,rgba(99,102,241,.10),transparent),
      radial-gradient(900px 500px at -5% 0%,rgba(59,130,246,.08),transparent),
      var(--bg);
    color:var(--tx);font-family:Inter,sans-serif;font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:22px}
  .glass{position:relative;background:linear-gradient(180deg,#ffffff,#fbfcfe);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shadow-card)}
  .glass::before{content:"";position:absolute;inset:0 0 auto 0;height:1px;border-radius:var(--r) var(--r) 0 0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);pointer-events:none}
  .mut{color:var(--mut)}.hidden{display:none!important}
  .badge{display:inline-flex;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid}
  .b-ok{background:linear-gradient(180deg,rgba(34,197,94,.14),rgba(34,197,94,.07));color:#15803d;border-color:rgba(34,197,94,.32)}
  .b-warn{background:linear-gradient(180deg,rgba(245,158,11,.16),rgba(245,158,11,.08));color:#b45309;border-color:rgba(245,158,11,.34)}
  .b-info{background:linear-gradient(180deg,rgba(59,130,246,.14),rgba(59,130,246,.07));color:#1d4ed8;border-color:rgba(59,130,246,.32)}
  .btn{border:1px solid var(--bd);background:#fff;color:var(--tx);border-radius:var(--rs);padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.16s ease;box-shadow:0 1px 2px rgba(15,23,42,.04)}
  .btn:hover{border-color:#cbd5e1;background:#f8fafc;transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(180deg,var(--blue),var(--blue-h));border-color:var(--blue-h);color:#fff;box-shadow:var(--shadow-blue)}
  .btn.primary:hover{filter:brightness(1.05);box-shadow:0 8px 22px rgba(59,130,246,.45)}
  .btn.ok{background:linear-gradient(180deg,rgba(34,197,94,.14),rgba(34,197,94,.08));border-color:rgba(34,197,94,.4);color:#15803d}
  .btn.ok:hover{background:rgba(34,197,94,.18)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;border:1px solid var(--bd);border-radius:999px;padding:6px 11px;font-size:12px;color:#475569;cursor:pointer;text-decoration:none;transition:.16s ease}
  .chip:hover{color:var(--blue-h);border-color:#bfdbfe;background:#eff6ff}
  .field{margin-bottom:10px}.field label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
  .inp{width:100%;background:#fff;border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;color:var(--tx);font-family:inherit;font-size:13px;transition:.16s ease}
  .inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  .logo{font-weight:800}.logo b{color:var(--tx)}.logo span{color:var(--indigo)}
  .top{display:flex;align-items:center;gap:14px;padding:14px 20px;margin-bottom:18px}
  .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--indigo));display:grid;place-items:center;font-weight:800;color:#fff;box-shadow:var(--shadow-blue)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .tile{padding:16px 18px;border-left:3px solid var(--blue)}.tile .k{font-size:12px;color:var(--mut);font-weight:600}.tile .v{font-size:24px;font-weight:800;margin-top:4px;color:var(--tx)}
  .ord{padding:14px 16px;border:1px solid var(--bd);border-radius:var(--rm);background:linear-gradient(180deg,#ffffff,#fbfcfe);margin-bottom:12px;box-shadow:0 1px 2px rgba(15,23,42,.04);transition:.16s ease}
  .ord:hover{border-color:#cbd5e1;box-shadow:var(--shadow-hover);transform:translateY(-1px)}
  .ord .row1{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}.ord .id{font-weight:800;color:var(--tx)}.ord .route{font-weight:700}
  .ord .meta{font-size:12px;color:var(--mut);display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}.ord .docs{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}.h{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .center{min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:100%;max-width:380px;padding:28px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0f172a;border:1px solid rgba(255,255,255,.12);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:.25s;box-shadow:0 12px 30px rgba(15,23,42,.35)}
  .toast.show{opacity:1}.toast.err{border-color:rgba(239,68,68,.6)}.toast.ok{border-color:rgba(34,197,94,.6)}
  .vrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--bd);border-radius:10px;margin-bottom:7px;background:#fff;transition:.16s ease}
  .vrow:hover{background:#f8fafc;border-color:#cbd5e1}
  @media(max-width:880px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style></head><body>

<div id="viewLogin" class="center hidden"><div class="glass card">
  <div class="logo" style="text-align:center;font-size:24px;margin-bottom:4px"><b>Vallor</b><span>Soft</span></div>
  <div class="mut" style="text-align:center;margin-bottom:20px" data-i18n="car.portalSub">Alvállalkozói portál</div>
  <div class="field"><label data-i18n="common.email">E-mail</label><input class="inp" id="liEmail" type="email"></div>
  <div class="field"><label data-i18n="common.password">Jelszó</label><input class="inp" id="liPass" type="password" onkeydown="if(event.key==='Enter')Carrier.login()"></div>
  <button class="btn primary" style="width:100%;margin-top:6px" onclick="Carrier.login()" data-i18n="car.loginBtn">Belépés</button>
  <div class="mut" style="text-align:center;margin-top:14px;font-size:11px" data-i18n="car.loginHint">A hozzáférést a fuvarozód adja meghívóval.</div>
</div></div>

<div id="viewSet" class="center hidden"><div class="glass card">
  <div class="logo" style="text-align:center;font-size:24px;margin-bottom:4px"><b>Vallor</b><span>Soft</span></div>
  <div class="mut" style="text-align:center;margin-bottom:20px" data-i18n="car.setPwSub">Állítsd be a jelszavad</div>
  <div class="field"><label data-i18n="car.newPw">Új jelszó (min. 6 karakter)</label><input class="inp" id="spPass" type="password"></div>
  <div class="field"><label data-i18n="car.pwAgain">Jelszó újra</label><input class="inp" id="spPass2" type="password" onkeydown="if(event.key==='Enter')Carrier.setPw()"></div>
  <button class="btn primary" style="width:100%;margin-top:6px" onclick="Carrier.setPw()" data-i18n="car.saveLogin">Mentés és belépés</button>
</div></div>

<div id="viewDash" class="wrap hidden">
  <div class="glass top">
    <div class="logo" style="font-size:20px"><b>Vallor</b><span>Soft</span> <span class="mut" style="font-size:13px;font-weight:500" data-i18n="car.topSub">· Alvállalkozói portál</span></div>
    <div style="margin-left:auto;text-align:right"><div id="dCarrier" style="font-weight:700"></div><div id="dCeg" class="mut" style="font-size:12px"></div></div>
    <div class="av" id="dAv">·</div>
    <button class="btn" style="padding:7px 12px" onclick="Carrier.logout()" data-i18n="common.logout">Kilépés</button>
  </div>

  <div class="stats" id="dStats"></div>

  <div class="grid">
    <div><div class="glass" style="padding:16px 18px"><div class="h" data-i18n="car.assignedOrders">📦 Rád osztott fuvarok</div><div id="dOrders"></div></div></div>
    <div>
      <div class="glass" style="padding:16px 18px;margin-bottom:16px">
        <div class="h" data-i18n="car.myVehicles">🚚 Járműveim</div>
        <div id="dVehicles" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <input class="inp" id="vCam" data-i18n-ph="car.phTractorReq" placeholder="Vontató rendszám *" style="flex:1;min-width:120px">
          <input class="inp" id="vRem" data-i18n-ph="car.phTrailer" placeholder="Pótkocsi" style="flex:1;min-width:100px">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          <input class="inp" id="vMarca" data-i18n-ph="car.phBrand" placeholder="Márka" style="flex:1;min-width:100px">
          <input class="inp" id="vModel" data-i18n-ph="car.phModel" placeholder="Modell" style="flex:1;min-width:100px">
        </div>
        <div style="margin-top:6px">
          <input class="inp" id="vSofer" data-i18n-ph="car.phDriver" placeholder="Sofőr neve (opcionális)">
        </div>
        <button class="btn ok" style="width:100%;margin-top:8px" onclick="Carrier.addVehicle()" data-i18n="car.addVehicle">＋ Jármű felvitele</button>
        <div class="mut" style="font-size:11px;margin-top:6px" data-i18n="car.vehicleHint">A felvitt járművet a diszpécser látja a kiosztásnál.</div>
      </div>
      <div class="glass" style="padding:16px 18px">
        <div class="h" data-i18n="car.uploadDoc">📎 Dokumentum feltöltése</div>
        <div class="field"><label data-i18n="car.docKind">Típus</label><select class="inp" id="uKind"><option value="invoice" selected data-i18n="car.kindInvoice">Számla / Factură</option><option value="cmr" data-i18n="car.kindCmr">Aláírt CMR / POD</option><option value="insurance" data-i18n="car.kindInsurance">CMR-biztosítás</option><option value="contract" data-i18n="car.kindContract">Szerződés</option><option value="other" data-i18n="car.kindOther">Egyéb</option></select></div>
        <div class="field"><label data-i18n="car.docOrder">Fuvarhoz (opcionális)</label><select class="inp" id="uOrder"><option value="" data-i18n="car.general">— általános —</option></select></div>
        <div class="field"><label data-i18n="car.docFile">Fájl (PDF/kép)</label><input class="inp" id="uFile" type="file" accept=".pdf,.jpg,.jpeg,.png"></div>
        <button class="btn primary" style="width:100%" onclick="Carrier.upload()" data-i18n="car.uploadBtn">Feltöltés</button>
        <div id="dMyDocs" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/carrier.js?v=20260614qa"></script>
<script src="/legal-ack.js"></script>
</body></html>
