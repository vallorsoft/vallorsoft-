<!doctype html>
<html lang="hu"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>VallorSoft — Alvállalkozói portál</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05070b;--panel:#141c25;--tx:#e9eef5;--mut:#8a97a8;--red:#e10b1a;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;--bd:rgba(255,255,255,.08);--r:18px;--rm:12px;--rs:8px}
  *{box-sizing:border-box}body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,rgba(225,11,26,.10),transparent),var(--bg);color:var(--tx);font-family:Inter,sans-serif;font-size:14px;line-height:1.5}
  .wrap{max-width:1080px;margin:0 auto;padding:22px}
  .glass{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid var(--bd);border-radius:var(--r)}
  .mut{color:var(--mut)}.hidden{display:none!important}
  .badge{display:inline-flex;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid}
  .b-ok{background:rgba(34,197,94,.16);color:#4ade80;border-color:rgba(34,197,94,.4)}
  .b-warn{background:rgba(245,158,11,.16);color:#fbbf24;border-color:rgba(245,158,11,.4)}
  .b-info{background:rgba(59,130,246,.16);color:#60a5fa;border-color:rgba(59,130,246,.4)}
  .btn{border:1px solid var(--bd);background:rgba(255,255,255,.04);color:var(--tx);border-radius:var(--rs);padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:rgba(255,255,255,.22)}.btn.primary{background:var(--red);border-color:var(--red);color:#fff}.btn.ok{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.45);color:#4ade80}
  .chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:999px;padding:6px 11px;font-size:12px;color:var(--mut);cursor:pointer;text-decoration:none}
  .chip:hover{color:#fff;border-color:rgba(255,255,255,.22)}
  .field{margin-bottom:10px}.field label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
  .inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;color:var(--tx);font-family:inherit;font-size:13px}
  .logo{font-weight:800}.logo b{color:#fff}.logo span{color:var(--red)}
  .top{display:flex;align-items:center;gap:14px;padding:14px 20px;margin-bottom:18px}
  .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a0710);display:grid;place-items:center;font-weight:800;color:#fff}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .tile{padding:16px 18px}.tile .k{font-size:12px;color:var(--mut);font-weight:600}.tile .v{font-size:24px;font-weight:800;margin-top:4px}
  .ord{padding:14px 16px;border:1px solid var(--bd);border-radius:var(--rm);background:rgba(255,255,255,.02);margin-bottom:12px}
  .ord .row1{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}.ord .id{font-weight:800;color:#fff}.ord .route{font-weight:700}
  .ord .meta{font-size:12px;color:var(--mut);display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}.ord .docs{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}.h{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .center{min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:100%;max-width:380px;padding:28px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#141c25;border:1px solid var(--bd);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:.25s;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1}.toast.err{border-color:rgba(239,68,68,.5)}.toast.ok{border-color:rgba(34,197,94,.5)}
  .vrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--bd);border-radius:10px;margin-bottom:7px;background:rgba(255,255,255,.02)}
  @media(max-width:880px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style></head><body>

<div id="viewLogin" class="center hidden"><div class="glass card">
  <div class="logo" style="text-align:center;font-size:24px;margin-bottom:4px"><b>Vallor</b><span>Soft</span></div>
  <div class="mut" style="text-align:center;margin-bottom:20px" data-i18n="cp.subtitle">Alvállalkozói portál</div>
  <div class="field"><label data-i18n="common.email">E-mail</label><input class="inp" id="liEmail" type="email"></div>
  <div class="field"><label data-i18n="common.password">Jelszó</label><input class="inp" id="liPass" type="password" onkeydown="if(event.key==='Enter')Carrier.login()"></div>
  <button class="btn primary" style="width:100%;margin-top:6px" onclick="Carrier.login()" data-i18n="login.signin">Belépés</button>
  <div class="mut" style="text-align:center;margin-top:14px;font-size:11px" data-i18n="pt.inviteNote">A hozzáférést a fuvarozód adja meghívóval.</div>
</div></div>

<div id="viewSet" class="center hidden"><div class="glass card">
  <div class="logo" style="text-align:center;font-size:24px;margin-bottom:4px"><b>Vallor</b><span>Soft</span></div>
  <div class="mut" style="text-align:center;margin-bottom:20px" data-i18n="pt.setPw">Állítsd be a jelszavad</div>
  <div class="field"><label data-i18n="pt.newPw">Új jelszó (min. 6 karakter)</label><input class="inp" id="spPass" type="password"></div>
  <div class="field"><label data-i18n="pt.pwAgain">Jelszó újra</label><input class="inp" id="spPass2" type="password" onkeydown="if(event.key==='Enter')Carrier.setPw()"></div>
  <button class="btn primary" style="width:100%;margin-top:6px" onclick="Carrier.setPw()" data-i18n="pt.saveEnter">Mentés és belépés</button>
</div></div>

<div id="viewDash" class="wrap hidden">
  <div class="glass top">
    <div class="logo" style="font-size:20px"><b>Vallor</b><span>Soft</span> <span class="mut" style="font-size:13px;font-weight:500">· <span data-i18n="cp.subtitle">Alvállalkozói portál</span></span></div>
    <div style="margin-left:auto;text-align:right"><div id="dCarrier" style="font-weight:700"></div><div id="dCeg" class="mut" style="font-size:12px"></div></div>
    <div class="av" id="dAv">·</div>
    <button class="btn" style="padding:7px 12px" onclick="Carrier.logout()" data-i18n="common.logout">Kilépés</button>
  </div>

  <div class="stats" id="dStats"></div>

  <div class="grid">
    <div><div class="glass" style="padding:16px 18px"><div class="h" data-i18n="cp.yourOrders">📦 Rád osztott fuvarok</div><div id="dOrders"></div></div></div>
    <div>
      <div class="glass" style="padding:16px 18px;margin-bottom:16px">
        <div class="h" data-i18n="cp.myVehicles">🚚 Járműveim</div>
        <div id="dVehicles" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <input class="inp" id="vCam" placeholder="Vontató rendszám *" data-i18n-ph="cp.tractorPh" style="flex:1;min-width:120px">
          <input class="inp" id="vRem" placeholder="Pótkocsi" data-i18n-ph="cp.trailerPh" style="flex:1;min-width:100px">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          <input class="inp" id="vMarca" placeholder="Márka" data-i18n-ph="cp.brandPh" style="flex:1;min-width:100px">
          <input class="inp" id="vModel" placeholder="Modell" data-i18n-ph="cp.modelPh" style="flex:1;min-width:100px">
        </div>
        <button class="btn ok" style="width:100%;margin-top:8px" onclick="Carrier.addVehicle()" data-i18n="cp.addVehicle">＋ Jármű felvitele</button>
        <div class="mut" style="font-size:11px;margin-top:6px" data-i18n="cp.vehNote">A felvitt járművet a diszpécser látja a kiosztásnál.</div>
      </div>
      <div class="glass" style="padding:16px 18px">
        <div class="h" data-i18n="cp.docUpload">📎 Dokumentum feltöltése</div>
        <div class="field"><label data-i18n="pt.type">Típus</label><select class="inp" id="uKind"><option value="cmr" data-i18n="cp.kindCmr">Aláírt CMR / POD</option><option value="invoice" data-i18n="cp.kindInvoice">Számla</option><option value="insurance" data-i18n="cp.kindInsurance">CMR-biztosítás</option><option value="contract" data-i18n="cp.kindContract">Szerződés</option><option value="other" data-i18n="cp.kindOther">Egyéb</option></select></div>
        <div class="field"><label data-i18n="cp.toOrder">Fuvarhoz (opcionális)</label><select class="inp" id="uOrder"><option value="" data-i18n="cp.general">— általános —</option></select></div>
        <div class="field"><label data-i18n="cp.filePdf">Fájl (PDF/kép)</label><input class="inp" id="uFile" type="file" accept=".pdf,.jpg,.jpeg,.png"></div>
        <button class="btn primary" style="width:100%" onclick="Carrier.upload()" data-i18n="cp.uploadBtn">Feltöltés</button>
        <div id="dMyDocs" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/i18n.js?v=20260612"></script>
<script src="/i18n-srv.js?v=20260612"></script>
<script src="/carrier.js?v=20260612"></script>
</body></html>
