<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog — VallorSoft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/landing.css">
  <style>
    /* ── Blog cikk oldal ── */
    .bp-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      padding: 100px 24px 56px;
      text-align: center;
    }
    .bp-hero-tag {
      display: inline-block;
      background: rgba(99,102,241,0.25);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 14px;
      margin-bottom: 20px;
    }
    .bp-hero-title {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      line-height: 1.2;
      color: #f1f5f9;
      max-width: 760px;
      margin: 0 auto 24px;
    }
    .bp-hero-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #818cf8;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 8px;
      transition: color .2s;
    }
    .bp-hero-back:hover { color: #a5b4fc; }

    /* ── Tartalom terület ── */
    .bp-body {
      background: #f8fafc;
      min-height: 50vh;
      padding: 56px 24px 96px;
    }
    .bp-article {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 24px rgba(0,0,0,.04);
      padding: 48px 56px;
    }
    @media (max-width: 600px) {
      .bp-article { padding: 28px 20px; }
    }
    .bp-content {
      font-size: 16px;
      line-height: 1.85;
      color: #334155;
    }
    .bp-content h2 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 2.2em 0 .65em;
      color: #0f172a;
    }
    .bp-content h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 1.8em 0 .5em;
      color: #1e293b;
    }
    .bp-content p { margin-bottom: 1.1em; }
    .bp-content ul, .bp-content ol { margin: .4em 0 1.1em 1.6em; }
    .bp-content li { margin-bottom: .45em; }
    .bp-content a { color: #6366f1; }
    .bp-content a:hover { text-decoration: underline; }
    .bp-content blockquote {
      border-left: 3px solid #6366f1;
      padding-left: 16px;
      color: #475569;
      font-style: italic;
      margin: 1.5em 0;
    }
    .bp-empty {
      color: #94a3b8;
      font-size: 15px;
      text-align: center;
      padding: 48px 0;
    }
    .bp-loading {
      color: #6366f1;
      text-align: center;
      padding: 48px 0;
      font-size: 15px;
    }
    .bp-divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 40px 0;
    }
    .bp-cta {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      margin-top: 40px;
    }
    .bp-cta h3 { color: #fff; font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .bp-cta p { color: rgba(255,255,255,.8); font-size: 14px; margin-bottom: 16px; }
    .bp-cta a {
      display: inline-block;
      background: #fff;
      color: #4f46e5;
      font-weight: 700;
      font-size: 13px;
      border-radius: 8px;
      padding: 9px 22px;
      text-decoration: none;
      transition: opacity .2s;
    }
    .bp-cta a:hover { opacity: .9; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<header class="lp-navbar" id="navbar">
  <div class="lp-container lp-navbar-inner">
    <a href="/" class="lp-logo">
      <span class="lp-logo-vallor">Vallor</span><span class="lp-logo-soft">Soft</span>
    </a>
    <nav class="lp-nav-menu">
      <ul class="lp-nav-list">
        <li><a href="/#blog" class="lp-nav-link" id="navBackBlog">← Blog</a></li>
        <li><a href="/login" class="lp-nav-link" id="navLogin">Autentificare</a></li>
      </ul>
    </nav>
    <button id="languageToggle" class="lp-lang-btn" title="Váltás magyarra / Schimbă în română">HU</button>
  </div>
</header>

<!-- HERO SÁV (cím betöltés előtt üres, JS tölti ki) -->
<div class="bp-hero" id="postHero">
  <span class="bp-hero-tag" id="postTag">Blog</span>
  <h1 class="bp-hero-title" id="postTitle">
    <span class="bp-loading" id="loadingMsg">Se încarcă...</span>
  </h1>
  <a href="/#blog" class="bp-hero-back" id="backLink">← Blog</a>
</div>

<!-- TARTALOM -->
<div class="bp-body">
  <div class="bp-article">
    <div class="bp-content" id="postContent"></div>
    <hr class="bp-divider" id="ctaDivider" style="display:none;">
    <div class="bp-cta" id="postCta" style="display:none;">
      <h3 id="ctaTitle">Próbálja ki a VallorSoft-ot ingyen</h3>
      <p id="ctaSubtitle">14 nap ingyenesen — bankkártya nélkül, bármikor lemondható.</p>
      <a href="/register" id="ctaBtn">Ingyenes próba indítása</a>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="lp-footer" style="padding: 32px 0;">
  <div class="lp-container">
    <div style="text-align:center;border-top:1px solid rgba(255,255,255,0.08);padding-top:24px;">
      <a href="/" class="lp-logo">
        <span class="lp-logo-vallor">Vallor</span><span class="lp-logo-soft">Soft</span>
      </a>
      <p style="color:#64748b;font-size:12px;margin-top:8px;">© 2024 VALLOR TEAM SRL. Toate drepturile rezervate.</p>
    </div>
  </div>
</footer>

<script>
(function() {
  var TRANS = {
    ro: {
      back: '← Blog',
      loading: 'Se încarcă...',
      notFound: 'Articolul nu a fost găsit.',
      noContent: 'Conținut indisponibil momentan.',
      tag: 'Blog',
      ctaTitle: 'Încercați VallorSoft gratuit',
      ctaSubtitle: '14 zile gratuit — fără card bancar, anulare oricând.',
      ctaBtn: 'Începeți testarea gratuită',
      navBack: '← Blog',
      navLogin: 'Autentificare',
    },
    hu: {
      back: '← Blog',
      loading: 'Betöltés...',
      notFound: 'A cikk nem található.',
      noContent: 'A tartalom jelenleg nem érhető el.',
      tag: 'Blog',
      ctaTitle: 'Próbálja ki a VallorSoft-ot ingyen',
      ctaSubtitle: '14 nap ingyenesen — bankkártya nélkül, bármikor lemondható.',
      ctaBtn: 'Ingyenes próba indítása',
      navBack: '← Blog',
      navLogin: 'Bejelentkezés',
    }
  };

  var lang = localStorage.getItem('vs-lang') || 'ro';
  var t = TRANS[lang] || TRANS.ro;

  // Navbar szövegek
  document.getElementById('navBackBlog').textContent = t.navBack;
  document.getElementById('navLogin').textContent = t.navLogin;
  document.getElementById('backLink').textContent = t.back;
  document.getElementById('postTag').textContent = t.tag;
  document.getElementById('loadingMsg').textContent = t.loading;

  // Nyelv-gomb
  var btn = document.getElementById('languageToggle');
  btn.textContent = lang === 'ro' ? 'HU' : 'RO';
  btn.addEventListener('click', function() {
    localStorage.setItem('vs-lang', lang === 'ro' ? 'hu' : 'ro');
    location.reload();
  });

  // CTA fordítás
  document.getElementById('ctaTitle').textContent = t.ctaTitle;
  document.getElementById('ctaSubtitle').textContent = t.ctaSubtitle;
  document.getElementById('ctaBtn').textContent = t.ctaBtn;

  // Blog cikk id az URL-ből
  var parts = window.location.pathname.split('/').filter(Boolean);
  var id = parseInt(parts[parts.length - 1], 10);
  var titleEl = document.getElementById('postTitle');
  var contentEl = document.getElementById('postContent');

  if (![1, 2, 3].includes(id)) {
    titleEl.textContent = t.notFound;
    return;
  }

  // Cikk betöltése
  fetch('/api/blog/' + id)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        titleEl.textContent = t.notFound;
        return;
      }
      var title   = lang === 'hu' ? (d.titleHu   || d.title)   : d.title;
      var content = lang === 'hu' ? (d.contentHu || d.content) : d.content;

      // Cím frissítése
      titleEl.textContent = title || t.notFound;
      document.title = (title || 'Blog') + ' — VallorSoft';

      if (content) {
        contentEl.innerHTML = content;
        // CTA megjelenítése ha van tartalom
        document.getElementById('ctaDivider').style.display = '';
        document.getElementById('postCta').style.display = '';
      } else {
        contentEl.innerHTML = '<p class="bp-empty">' + t.noContent + '</p>';
      }
    })
    .catch(function() {
      titleEl.textContent = t.notFound;
    });

  // Navbar sticky scroll
  var navbar = document.getElementById('navbar');
  window.addEventListener('scroll', function() {
    navbar.classList.toggle('scrolled', window.scrollY > 20);
  });
})();
</script>
</body>
</html>
