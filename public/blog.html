<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog — VallorSoft | Resurse pentru transportatori</title>
  <meta name="description" content="Articole și ghiduri pentru transportatori — e-Factura, UIT, digitalizare flotă, ANAF și mai mult.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Blog VallorSoft — Resurse pentru transportatori">
  <meta property="og:description" content="Articole și ghiduri pentru transportatori — e-Factura, UIT, digitalizare flotă.">
  <link rel="canonical" href="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/landing.css">
  <style>
    .bl-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      padding: 96px 24px 56px;
      text-align: center;
    }
    .bl-hero-tag {
      display: inline-block;
      background: rgba(99,102,241,0.25);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 14px;
      margin-bottom: 16px;
    }
    .bl-hero-title { font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 800; color: #f1f5f9; margin-bottom: 12px; }
    .bl-hero-sub { color: #94a3b8; font-size: 16px; max-width: 560px; margin: 0 auto; }
    .bl-body { background: #f8fafc; padding: 56px 24px 96px; min-height: 50vh; }
    .bl-grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .bl-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .18s, box-shadow .18s;
    }
    .bl-card:hover { transform: translateY(-3px); box-shadow: 0 4px 24px rgba(99,102,241,.12); }
    .bl-card-cover {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bl-card-cover-icon { font-size: 40px; }
    .bl-card-body { padding: 20px 24px; flex: 1; display: flex; flex-direction: column; }
    .bl-card-date { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
    .bl-card-title { font-size: 1.05rem; font-weight: 700; color: #0f172a; margin-bottom: 10px; line-height: 1.4; }
    .bl-card-excerpt { font-size: 14px; color: #475569; line-height: 1.65; flex: 1; margin-bottom: 16px; }
    .bl-card-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #6366f1;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    .bl-card-link:hover { text-decoration: underline; }
    .bl-empty { text-align: center; color: #94a3b8; padding: 64px 0; font-size: 16px; }
    .bl-loading { text-align: center; color: #6366f1; padding: 64px 0; font-size: 15px; }
  </style>
</head>
<body>

<header class="lp-navbar" id="navbar">
  <div class="lp-container lp-navbar-inner">
    <a href="/" class="lp-logo">
      <span class="lp-logo-vallor">Vallor</span><span class="lp-logo-soft">Soft</span>
    </a>
    <nav class="lp-nav-menu">
      <ul class="lp-nav-list">
        <li><a href="/" class="lp-nav-link" id="navHome">Acasă</a></li>
        <li><a href="/login" class="lp-nav-link" id="navLogin">Autentificare</a></li>
      </ul>
    </nav>
    <button id="languageToggle" class="lp-lang-btn">HU</button>
  </div>
</header>

<div class="bl-hero">
  <span class="bl-hero-tag" id="heroTag">Blog</span>
  <h1 class="bl-hero-title" id="heroTitle">Resurse & Noutăți</h1>
  <p class="bl-hero-sub" id="heroSub">Articole și ghiduri pentru transportatori din România — e-Factura, UIT, digitalizare și eficiență.</p>
</div>

<div class="bl-body">
  <div class="bl-grid" id="postGrid">
    <div class="bl-loading" id="loadingEl">Se încarcă...</div>
  </div>
</div>

<footer class="lp-footer" style="padding: 32px 0;">
  <div class="lp-container">
    <div style="text-align:center;border-top:1px solid rgba(255,255,255,0.08);padding-top:24px;">
      <a href="/" class="lp-logo">
        <span class="lp-logo-vallor">Vallor</span><span class="lp-logo-soft">Soft</span>
      </a>
      <p style="color:#64748b;font-size:12px;margin-top:8px;">© 2024 VALLOR TEAM SRL. Toate drepturile rezervate.</p>
    </div>
  </div>
</footer>

<script>
(function() {
  var TRANS = {
    ro: {
      heroTag: 'Blog', heroTitle: 'Resurse & Noutăți',
      heroSub: 'Articole și ghiduri pentru transportatori din România — e-Factura, UIT, digitalizare și eficiență.',
      navHome: 'Acasă', navLogin: 'Autentificare',
      loading: 'Se încarcă...', empty: 'Nu există articole momentan.',
      readMore: 'Citește mai mult →'
    },
    hu: {
      heroTag: 'Blog', heroTitle: 'Erőforrások és Újdonságok',
      heroSub: 'Cikkek és útmutatók román fuvarozóknak — e-Számla, UIT, digitalizáció és hatékonyság.',
      navHome: 'Főoldal', navLogin: 'Bejelentkezés',
      loading: 'Betöltés...', empty: 'Jelenleg nincs cikk.',
      readMore: 'Tovább olvasom →'
    }
  };

  var lang = localStorage.getItem('vs-lang') || 'ro';
  var t = TRANS[lang] || TRANS.ro;

  document.getElementById('heroTag').textContent = t.heroTag;
  document.getElementById('heroTitle').textContent = t.heroTitle;
  document.getElementById('heroSub').textContent = t.heroSub;
  document.getElementById('navHome').textContent = t.navHome;
  document.getElementById('navLogin').textContent = t.navLogin;
  document.getElementById('loadingEl').textContent = t.loading;

  var langBtn = document.getElementById('languageToggle');
  langBtn.textContent = lang === 'ro' ? 'HU' : 'RO';
  langBtn.addEventListener('click', function() {
    localStorage.setItem('vs-lang', lang === 'ro' ? 'hu' : 'ro');
    location.reload();
  });

  var ICONS = ['📄', '📊', '🚚', '💡', '📋', '🌐'];

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString(lang === 'hu' ? 'hu-HU' : 'ro-RO', { year:'numeric', month:'long', day:'numeric' });
  }

  fetch('/api/blog/list')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var grid = document.getElementById('postGrid');
      grid.innerHTML = '';
      if (!d.ok || !d.posts || !d.posts.length) {
        grid.innerHTML = '<div class="bl-empty">' + escHtml(t.empty) + '</div>';
        return;
      }
      d.posts.forEach(function(p, i) {
        var title   = lang === 'hu' ? (p.title_hu   || p.title_ro)   : p.title_ro;
        var excerpt = lang === 'hu' ? (p.excerpt_hu || p.excerpt_ro) : p.excerpt_ro;
        var card = document.createElement('div');
        card.className = 'bl-card';
        var coverHtml = p.cover_image_url
          ? '<img class="bl-card-cover" src="' + escHtml(p.cover_image_url) + '" alt="' + escHtml(title) + '">'
          : '<div class="bl-card-cover"><span class="bl-card-cover-icon">' + (ICONS[i % ICONS.length]) + '</span></div>';
        card.innerHTML =
          coverHtml +
          '<div class="bl-card-body">' +
            '<div class="bl-card-date">' + escHtml(renderDate(p.published_at)) + '</div>' +
            '<div class="bl-card-title">' + escHtml(title) + '</div>' +
            (excerpt ? '<div class="bl-card-excerpt">' + escHtml(excerpt) + '</div>' : '') +
            '<a href="/blog/' + escHtml(p.slug) + '" class="bl-card-link">' + t.readMore + '</a>' +
          '</div>';
        grid.appendChild(card);
      });
    })
    .catch(function() {
      document.getElementById('postGrid').innerHTML = '<div class="bl-loading">Se încarcă...</div>';
    });

  window.addEventListener('scroll', function() {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
  });

  document.getElementById('canonicalLink') && document.getElementById('canonicalLink').setAttribute('href', window.location.origin + '/blog');
})();
</script>
</body>
</html>
