<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/i18n.js?v=20260616pw3"></script>
  <title data-i18n="title.reset">vallorSoft - Új jelszó</title>
  <link rel="stylesheet" href="/style.css?v=20260614qa">
  <!-- Landing-skin (IZOLÁLT — csak ez az oldal): prémium világos, kék/indigó.
       A közös style.css-t NEM módosítja; funkció / ID-k / data-i18n változatlan. -->
  <style>
    :root{
      --lp-blue:#3b82f6; --lp-blue-hover:#2563eb; --lp-indigo:#6366f1;
      --lp-bg:#f7f9fc; --lp-card:#ffffff; --lp-border:#e2e8f0;
      --lp-text:#0f172a; --lp-muted:#64748b;
    }
    body{
      background:
        radial-gradient(900px 520px at 12% -8%, rgba(99,102,241,.07), transparent 70%),
        radial-gradient(760px 460px at 92% 0%, rgba(59,130,246,.06), transparent 70%),
        var(--lp-bg) !important;
      color:var(--lp-text) !important;
    }
    .login-wrap{ min-height:100vh; }
    .login-card.glass{
      position:relative;
      background:linear-gradient(180deg,#ffffff,#fbfcfe) !important;
      border:1px solid var(--lp-border) !important;
      border-radius:16px !important;
      box-shadow:0 1px 2px rgba(15,23,42,.05), 0 6px 20px rgba(15,23,42,.06) !important;
      backdrop-filter:none !important; -webkit-backdrop-filter:none !important;
      overflow:hidden;
    }
    .login-card.glass::before{
      content:""; position:absolute; inset:0 0 auto 0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.9), transparent);
      pointer-events:none;
    }
    .vs-logo .vallor{ color:var(--lp-text) !important; }
    .vs-logo .soft{ color:var(--lp-indigo) !important; text-shadow:none !important; }
    .login-card .head .sub{ color:var(--lp-muted) !important; }
    .login-card .field label{ color:var(--lp-muted) !important; }
    .login-card .input{
      background:#ffffff !important; border:1px solid var(--lp-border) !important;
      color:var(--lp-text) !important; border-radius:8px !important;
    }
    .login-card .input::placeholder{ color:#94a3b8 !important; }
    .login-card .input:focus{
      border-color:var(--lp-blue) !important;
      box-shadow:0 0 0 3px rgba(59,130,246,.15) !important; outline:none !important;
    }
    .login-card .btn.primary{
      background:linear-gradient(180deg,#3b82f6,#2563eb) !important;
      border:1px solid #2563eb !important; color:#fff !important;
      border-radius:8px !important;
      box-shadow:0 2px 8px rgba(59,130,246,.35), inset 0 1px 0 rgba(255,255,255,.25) !important;
      transition:transform .15s ease, box-shadow .15s ease, background .15s ease !important;
    }
    .login-card .btn.primary:hover{
      background:linear-gradient(180deg,#3f86f8,#2563eb) !important;
      box-shadow:0 4px 14px rgba(59,130,246,.45), inset 0 1px 0 rgba(255,255,255,.3) !important;
      transform:translateY(-1px);
    }
    .login-card .switch-link a, .login-card a{ color:var(--lp-blue) !important; }
    #formWrap p[data-i18n="rst.invalidLink"]{ color:var(--lp-muted) !important; }
    .toast{
      background:#ffffff !important; color:var(--lp-text) !important;
      border:1px solid var(--lp-border) !important;
      box-shadow:0 6px 20px rgba(15,23,42,.12) !important;
    }
  </style>
</head>
<body>
  <div class="toast-wrap" id="toasts"></div>

  <div class="login-wrap">
    <div class="login-card glass">
      <div class="head">
        <div class="vs-logo lg"><span class="vallor">vallor</span><span class="soft">Soft</span></div>
        <div class="sub" data-i18n="rst.subtitle">Új jelszó beállítása</div>
      </div>

      <div id="formWrap">
        <div class="field">
          <label data-i18n="rst.newPw">Új jelszó</label>
          <input class="input" type="password" id="pwd1" placeholder="••••••••" required>
          <div class="hint" style="font-size:.78rem;color:var(--muted,#8a97a8);margin-top:4px" data-i18n="rst.pwHint">Min. 8 karakter, 1 kisbetű, 1 nagybetű, 1 számjegy, 1 szimbólum (pl. _)</div>
        </div>

        <div class="field">
          <label data-i18n="rst.confirmPw">Új jelszó megerősítése</label>
          <input class="input" type="password" id="pwd2" placeholder="••••••••" required>
        </div>

        <button class="btn primary block xl" onclick="doReset()" id="btnReset" data-i18n="rst.save">Jelszó mentése</button>
      </div>

      <div class="switch-link">
        <a href="/login" data-i18n="rst.backToLogin">Vissza a bejelentkezéshez</a>
      </div>
    </div>
  </div>

  <script>
    function toast(m,k){
      var e=document.createElement('div');
      e.className='toast '+(k||'');
      e.textContent=m;
      document.getElementById('toasts').appendChild(e);
      setTimeout(function(){e.remove();},3500);
    }

    function getToken(){
      var params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    var TOKEN = getToken();
    if(!TOKEN){
      document.getElementById('formWrap').innerHTML =
        '<p style="color:var(--muted);text-align:center;line-height:1.6;" data-i18n="rst.invalidLink">Érvénytelen vagy hiányzó link. Kérjen új jelszó-visszaállítási linket a bejelentkezési oldalon.</p>';
      if (window.I18N) window.I18N.apply();
    }

    function doReset(){
      var p1 = document.getElementById('pwd1').value;
      var p2 = document.getElementById('pwd2').value;

      if(!p1 || !p2){
        toast(t('rst.fillBoth'), 'err');
        return;
      }
      if(p1.length < 8 || !/[a-z]/.test(p1) || !/[A-Z]/.test(p1) || !/[0-9]/.test(p1) || !/[^A-Za-z0-9]/.test(p1)){
        toast(t('rst.minLen'), 'err');
        return;
      }
      if(p1 !== p2){
        toast(t('rst.mismatch'), 'err');
        return;
      }

      var btn = document.getElementById('btnReset');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> ' + t('rst.saving');

      fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: TOKEN, password: p1 })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success){
          toast(data.message || t('rst.success'), 'ok');
          setTimeout(function(){ window.location.href = '/login'; }, 2000);
        } else {
          btn.disabled = false;
          btn.textContent = t('rst.save');
          toast(data.message || t('rst.failed'), 'err');
        }
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = t('rst.save');
        toast(t('rst.commError'), 'err');
      });
    }

    document.addEventListener('keypress', function(e){
      if(e.key === 'Enter' && TOKEN) doReset();
    });
  </script>
</body>
</html>
