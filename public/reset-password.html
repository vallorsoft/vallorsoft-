<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vallorSoft - Új jelszó</title>
  <link rel="stylesheet" href="/style.css?v=20260611">
  <script src="/i18n.js?v=20260612"></script>
  <script>(window.registerI18n||function(d){(window.__i18nQueue=window.__i18nQueue||[]).push(d);})({
    'reg.rpSub': { hu: 'Új jelszó beállítása', ro: 'Setați o parolă nouă' },
    'reg.rpNew': { hu: 'Új jelszó', ro: 'Parolă nouă' },
    'reg.rpConfirm': { hu: 'Új jelszó megerősítése', ro: 'Confirmați parola nouă' },
    'reg.rpSave': { hu: 'Jelszó mentése', ro: 'Salvează parola' },
    'reg.rpSaving': { hu: 'Mentés...', ro: 'Se salvează...' },
    'reg.rpBack': { hu: 'Vissza a bejelentkezéshez', ro: 'Înapoi la autentificare' },
    'reg.rpInvalid': { hu: 'Érvénytelen vagy hiányzó link. Kérjen új jelszó-visszaállítási linket a bejelentkezési oldalon.', ro: 'Link invalid sau lipsă. Solicitați un nou link de resetare a parolei pe pagina de autentificare.' },
    'reg.rpBothFields': { hu: 'Töltse ki mindkét mezőt!', ro: 'Completați ambele câmpuri!' },
    'reg.rpMinLen': { hu: 'A jelszó legalább 6 karakter legyen!', ro: 'Parola trebuie să aibă cel puțin 6 caractere!' },
    'reg.rpMismatch': { hu: 'A két jelszó nem egyezik!', ro: 'Cele două parole nu coincid!' },
    'reg.rpSuccess': { hu: 'Sikeres jelszóváltás!', ro: 'Parolă schimbată cu succes!' },
    'reg.rpError': { hu: 'Hiba történt.', ro: 'A apărut o eroare.' },
    'reg.rpCommErr': { hu: 'Szerver kommunikációs hiba!', ro: 'Eroare de comunicare cu serverul!' }
  });</script>
</head>
<body>
  <div class="toast-wrap" id="toasts"></div>

  <div class="login-wrap">
    <div class="login-card glass">
      <div class="head">
        <div class="vs-logo lg"><span class="vallor">vallor</span><span class="soft">Soft</span></div>
        <div class="sub" data-i18n="reg.rpSub">Új jelszó beállítása</div>
      </div>

      <div id="formWrap">
        <div class="field">
          <label data-i18n="reg.rpNew">Új jelszó</label>
          <input class="input" type="password" id="pwd1" placeholder="••••••••" required>
        </div>

        <div class="field">
          <label data-i18n="reg.rpConfirm">Új jelszó megerősítése</label>
          <input class="input" type="password" id="pwd2" placeholder="••••••••" required>
        </div>

        <button class="btn primary block xl" onclick="doReset()" id="btnReset" data-i18n="reg.rpSave">Jelszó mentése</button>
      </div>

      <div class="switch-link">
        <a href="/login" data-i18n="reg.rpBack">Vissza a bejelentkezéshez</a>
      </div>
    </div>
  </div>

  <script>
    function T(k,v){return (typeof window.t==='function')?window.t(k,v):k;}
    function toast(m,k){
      var e=document.createElement('div');
      e.className='toast '+(k||'');
      e.textContent=m;
      document.getElementById('toasts').appendChild(e);
      setTimeout(function(){e.remove();},3500);
    }

    function getToken(){
      var params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    var TOKEN = getToken();
    if(!TOKEN){
      document.getElementById('formWrap').innerHTML =
        '<p style="color:var(--muted);text-align:center;line-height:1.6;">'+T('reg.rpInvalid')+'</p>';
    }

    function doReset(){
      var p1 = document.getElementById('pwd1').value;
      var p2 = document.getElementById('pwd2').value;

      if(!p1 || !p2){
        toast(T('reg.rpBothFields'), 'err');
        return;
      }
      if(p1.length < 6){
        toast(T('reg.rpMinLen'), 'err');
        return;
      }
      if(p1 !== p2){
        toast(T('reg.rpMismatch'), 'err');
        return;
      }

      var btn = document.getElementById('btnReset');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> '+T('reg.rpSaving');

      fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: TOKEN, password: p1 })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success){
          toast(data.message || T('reg.rpSuccess'), 'ok');
          setTimeout(function(){ window.location.href = '/login'; }, 2000);
        } else {
          btn.disabled = false;
          btn.textContent = T('reg.rpSave');
          toast(data.message || T('reg.rpError'), 'err');
        }
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = T('reg.rpSave');
        toast(T('reg.rpCommErr'), 'err');
      });
    }

    document.addEventListener('keypress', function(e){
      if(e.key === 'Enter' && TOKEN) doReset();
    });
  </script>
</body>
</html>
