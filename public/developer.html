    :root { --dev-accent: #a855f7; --dev-accent2: #7c3aed; }

    .dev-layout { display: flex; min-height: 100vh; }
    .dev-sidebar { width: 240px; background: linear-gradient(180deg, rgba(12,18,24,0.98), rgba(5,7,11,0.99));

      display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .dev-logo { font-weight: 800; font-size: 18px; margin-bottom: 4px; }

      color: var(--muted); transition: all .15s; border: 1px solid transparent; }
    .dev-tab:hover { background: rgba(168,85,247,0.05); color: #fff; }
    .dev-tab.active { background: linear-gradient(180deg, rgba(168,85,247,0.2), rgba(168,85,247,0.05));
      color: #fff; border-color: rgba(168,85,247,0.3); }
    .dev-main { flex: 1; padding: 28px; overflow-y: auto; }
    .dev-pane { display: block; }
    .dev-pane.hidden { display: none !important; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .kpi { padding: 20px; border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.3));
      border: 1px solid var(--border); }
    .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .kpi .val { font-size: 36px; font-weight: 800; color: #fff; }
    .kpi.purple .val { color: var(--dev-accent); }
    .section-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 14px; }
    .ceg-card { background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.2));
      border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
    .ceg-card .ceg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .ceg-card .ceg-name { font-size: 16px; font-weight: 700; color: #fff; }
    .ceg-card .ceg-meta { display: flex; gap: 10px; flex-wrap: wrap; }
    .ceg-card .ceg-meta span { font-size: 12px; color: var(--muted); }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-badge.active { background: rgba(34,197,94,0.15); color: var(--ok); border: 1px solid rgba(34,197,94,0.3); }
    .status-badge.inactive { background: rgba(239,68,68,0.15); color: var(--err); border: 1px solid rgba(239,68,68,0.3); }
    .status-badge.cancelled { background: rgba(107,114,128,0.15); color: var(--muted); border: 1px solid rgba(107,114,128,0.3); }
    .btn-dev { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none;
      background: linear-gradient(180deg, rgba(168,85,247,0.3), rgba(168,85,247,0.1)); color: #c084fc;
      border: 1px solid rgba(168,85,247,0.3); transition: all .15s; }
    .btn-dev:hover { background: linear-gradient(180deg, rgba(168,85,247,0.5), rgba(168,85,247,0.2)); color: #fff; }
    .btn-danger-sm { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
      background: rgba(239,68,68,0.1); color: var(--err); border: 1px solid rgba(239,68,68,0.3); }
    .btn-ok-sm { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
      background: rgba(34,197,94,0.1); color: var(--ok); border: 1px solid rgba(34,197,94,0.3); }
    .modal-back { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; z-index:1000; padding:20px; }
    .modal-back.open { display:flex; }
    .dev-modal { width: min(520px,100%); max-height: 90vh; overflow-y: auto; padding: 28px;
      border-radius: 18px; background: var(--bg-2); border: 1px solid rgba(168,85,247,0.3); }
    .dev-modal h3 { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 20px; }
    .field { margin-bottom: 12px; }
    .field label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; font-weight:700; text-transform:uppercase; }
    .input, .select { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border-bright);
      border-radius:8px; padding:10px 14px; color:var(--text); font-size:14px; outline:none; }
    .select option { background: var(--bg-2); }
    .row-btns { display:flex; gap:10px; margin-top:16px; }
    .table { width:100%; border-collapse:collapse; font-size:13px; }
    .table th { text-align:left; padding:10px 12px; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
    .table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--soft); }
    .table tr:hover td { background: rgba(255,255,255,0.02); }
    /* Funkció toggle kapcsoló */
    .fsw { position:relative; display:inline-block; width:42px; height:24px; cursor:pointer; }
    .fsw input { opacity:0; width:0; height:0; }
    .fsw-s { position:absolute; inset:0; background:rgba(255,255,255,0.12); border:1px solid var(--border-bright); border-radius:24px; transition:.2s; }
    .fsw-s:before { content:''; position:absolute; height:18px; width:18px; left:3px; top:2px; background:#94a3b8; border-radius:50%; transition:.2s; }
    .fsw input:checked + .fsw-s { background:rgba(34,197,94,0.3); border-color:rgba(34,197,94,0.6); }
    .fsw input:checked + .fsw-s:before { transform:translateX(18px); background:var(--ok); }
    .fsw input:disabled + .fsw-s { opacity:.5; }

<script>
function T(k,v){return (typeof window.t==='function')?window.t(k,v):k;}
// A feature-catalog.js label-jei magyarul vannak — ezeket 'dev.feat.<key>' kulcson
// fordítjuk; ha nincs kulcs, marad a nyers label. A group-okat 'dev.grp.<group>'.
function featLabel(f){ var key='dev.feat.'+f.key; var tr=T(key); return (tr===key)?f.label:tr; }
function grpLabel(g){ var key='dev.grp.'+g; var tr=T(key); return (tr===key)?g:tr; }
function toast(m,k){var e=document.createElement('div');e.className='toast '+(k||'');e.textContent=m;document.getElementById('toasts').appendChild(e);setTimeout(function(){e.remove();},3000);}
function gas(fn,args){return new Promise(function(res,rej){fetch('/api/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({functionName:fn,arguments:args||[]})}).then(r=>r.json()).then(d=>{res(d.result);}).catch(rej);});}

function showPane(id) {
  document.querySelectorAll('.dev-pane').forEach(function(p){p.classList.add('hidden');});
  document.querySelectorAll('.dev-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('pane-'+id).classList.remove('hidden');
  if(id==='dash') loadDash();
  if(id==='cegek') loadCegek();
  if(id==='userek') loadUsers();
  if(id==='here') loadHerePane();
  if(id==='integ') loadIntegPane();
  if(id==='elofiz') loadElofizPane();
}

/* ── Integrációk: számlázó programok + cégek számlázói ── */
function loadIntegPane(){ if(window.BillingCard) BillingCard.mount('devBillingCardBox'); loadProviders(); loadCompBilling(); }
/* ── Előfizetések: csomagok + cég-hozzárendelés ── */
function loadElofizPane(){ loadPlanEditor(); loadCompPlans(); }

function loadProviders(){
  gas('getAvailableProviders').then(function(list){
    var el=document.getElementById('providerList'); if(!el) return;
    list=list||[];
    if(!list.length){ el.innerHTML='<div style="color:var(--muted);font-size:13px;">'+T('dev.noProvider')+'</div>'; return; }
    el.innerHTML=list.map(function(p){
      var fields=(p.fields||[]).map(function(f){return f.label;}).join(', ');
      return '<div style="border:1px solid rgba(168,85,247,0.3);background:rgba(168,85,247,0.06);border-radius:12px;padding:12px 16px;min-width:160px;">'
        +'<div style="font-weight:800;color:#fff;font-size:14px;">'+escHtml(p.display_name)+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:4px;">'+escHtml(fields)+'</div></div>';
    }).join('');
  });
}
function loadCompPlans(){
  Promise.all([gas('getCompaniesBillingOverview'),gas('getSubscriptionPlans')]).then(function(res){
    var ov=res[0], pl=res[1]; var tb=document.getElementById('compPlanTbody'); if(!tb) return;
    if(!ov||!ov.ok){ tb.innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--err);padding:20px;">'+T('dev.notAvail')+'</td></tr>'; return; }
    var plans=(pl&&pl.plans)||[];
    tb.innerHTML=(ov.companies||[]).map(function(c){
      var opts='<option value="">'+T('dev.planNone')+'</option>'+plans.map(function(p){return '<option value="'+p.id+'"'+(c.subscription_plan_id===p.id?' selected':'')+'>'+escHtml(p.name)+'</option>';}).join('');
      return '<tr><td><b style="color:#fff;">'+escHtml(c.nev)+'</b></td>'
        +'<td><select class="select" style="max-width:200px;" onchange="setCompPlan('+c.id+',this.value)">'+opts+'</select></td></tr>';
    }).join('');
  });
}
function loadPlanEditor(){
  gas('getSubscriptionPlans').then(function(r){
    var el=document.getElementById('planEditor'); if(!el) return;
    if(!r||!r.ok){ el.innerHTML='<div style="color:var(--err);">Nem elérhető.</div>'; return; }
    el.innerHTML=(r.plans||[]).map(function(p){
      var net=parseFloat(p.price_net)||0, vat=parseFloat(p.vat_percent)||21;
      var brutto=net*(1+vat/100), afa=brutto-net;
      return '<div class="ceg-card">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
        +'<div class="ceg-name">'+p.id+' — '+escHtml(p.name)+'</div>'
        +'<label class="fsw"><input type="checkbox" id="plActive_'+p.id+'" '+(p.is_active?'checked':'')+'><span class="fsw-s"></span></label></div>'
        +'<div class="field"><label>Név</label><input class="input" id="plName_'+p.id+'" value="'+escHtml(p.name)+'"></div>'
        +'<div class="field"><label>Leírás</label><input class="input" id="plDesc_'+p.id+'" value="'+escHtml(p.description||'')+'"></div>'
        +'<div class="field"><label>Nettó ár (EUR/hó)</label><input class="input" id="plPrice_'+p.id+'" type="number" step="0.01" value="'+net.toFixed(2)+'" oninput="recalcPlan('+p.id+','+vat+')"></div>'
        +'<div style="font-size:13px;color:var(--muted);margin-bottom:12px;">ÁFA ('+vat+'%): <span id="plVat_'+p.id+'">'+afa.toFixed(2)+'</span> EUR &nbsp;·&nbsp; Bruttó: <b style="color:#c084fc;" id="plGross_'+p.id+'">'+brutto.toFixed(2)+'</b> EUR</div>'
        +'<button class="btn-dev" onclick="savePlan('+p.id+')">💾 Mentés</button>'
        +'</div>';
    }).join('');
  });
}
function recalcPlan(id,vat){
  var net=parseFloat(document.getElementById('plPrice_'+id).value)||0;
  var brutto=net*(1+(vat||21)/100), afa=brutto-net;
  var v=document.getElementById('plVat_'+id), g=document.getElementById('plGross_'+id);
  if(v) v.textContent=afa.toFixed(2); if(g) g.textContent=brutto.toFixed(2);
}
function savePlan(id){
  var f={id:id,
    name:document.getElementById('plName_'+id).value.trim(),
    description:document.getElementById('plDesc_'+id).value.trim(),
    price_net:document.getElementById('plPrice_'+id).value,
    is_active:document.getElementById('plActive_'+id).checked};
  gas('updateSubscriptionPlan',[f]).then(function(r){ if(r&&r.ok){toast('Csomag mentve','ok');loadPlanEditor();}else{toast((r&&r.err)||'Hiba','err');} });
}
function loadCompBilling(){
  gas('getCompaniesBillingOverview').then(function(ov){
    var tb=document.getElementById('compBillingTbody'); if(!tb) return;
    if(!ov||!ov.ok){ tb.innerHTML='<tr><td colspan="3" style="text-align:center;color:var(--err);padding:20px;">Nem elérhető.</td></tr>'; return; }
    // XSS: a számlázó-név NEM kerülhet onclick JS-stringbe (ott az entity-escape
    // visszafejtődik) — index-alapú cache-ből olvassuk.
    window._compBillingCache=(ov.companies||[]);
    tb.innerHTML=(ov.companies||[]).map(function(c,idx){
      var since=c.billing_since?new Date(c.billing_since).toLocaleDateString('hu-HU'):'';
      var billing = c.provider
        ? escHtml(c.billing_name||c.provider)+' <button class="btn-dev" style="padding:3px 9px;font-size:11px;" onclick="viewCompBilling('+idx+')">megtekintés</button>'
        : '<span style="color:var(--muted);">—</span>';
      var invBtn = c.provider
        ? '<button class="btn-dev" onclick="openInvoiceModal('+c.id+')">🧾 Számla kiállítása</button>'
        : '<button class="btn-dev" disabled title="Nincs beállítva számlázó (Admin/Manager állítja be)" style="opacity:.5;cursor:not-allowed;">🧾 nincs számlázó</button>';
      return '<tr><td><b style="color:#fff;">'+escHtml(c.nev)+'</b></td>'
        +'<td>'+billing+'</td>'
        +'<td>'+invBtn+'</td></tr>';
    }).join('');
  });
}
function setCompPlan(cid,planId){
  gas('setCompanyPlan',[{company_id:cid,plan_id:planId||null}]).then(function(r){ if(r&&r.ok){toast('Csomag módosítva','ok');}else{toast((r&&r.err)||'Hiba','err');} });
}
function viewCompBilling(idx){
  var c=(window._compBillingCache||[])[idx]||{};
  var name=c.billing_name||c.provider||'—';
  var since=c.billing_since?new Date(c.billing_since).toLocaleDateString('hu-HU'):'';
  alert('💳 '+name+'\n\nBeállítva: '+(since||'—')+'\n\nA hitelesítő adatok titkosítva tárolódnak — developer számára sem láthatók.');
}

/* ── HERE szolgáltatási számla kiállítása ── */
var _invCompanyId=null, _invLastPdf=null;
function _invSpinner(txt){ return '<div style="text-align:center;padding:30px;color:var(--muted);"><span class="spinner" style="margin:0 auto 10px;width:26px;height:26px;"></span><div>'+txt+'</div></div>'; }
function _invErr(msg){ return '<h3 style="color:var(--err);">❌ Hiba</h3><div style="font-size:13px;margin-bottom:16px;">'+escHtml(msg)+'</div><div class="row-btns"><button class="btn-danger-sm" style="flex:1;" onclick="closeInvoiceModal()">Bezárás</button></div>'; }
function closeInvoiceModal(){ document.getElementById('invoiceModal').classList.remove('open'); }
function openInvoiceModal(cid){
  _invCompanyId=cid; _invLastPdf=null;
  document.getElementById('invoiceModal').classList.add('open');
  document.getElementById('invoiceModalBody').innerHTML=_invSpinner('Előnézet betöltése...');
  gas('previewHereInvoice',[{company_id:cid}]).then(function(r){
    var b=document.getElementById('invoiceModalBody');
    if(!r||!r.ok){ b.innerHTML=_invErr((r&&r.err)||'Nem sikerült az előnézet.'); return; }
    renderInvoicePreview(r);
  }).catch(function(){ document.getElementById('invoiceModalBody').innerHTML=_invErr('Hálózati hiba.'); });
}
function renderInvoicePreview(r){
  var b=document.getElementById('invoiceModalBody');
  var rows=(r.items||[]).map(function(it,i){
    var lineNet=it.quantity*it.price_net, afa=lineNet*(it.vat_percent/100), brutto=lineNet+afa;
    return '<div style="padding:8px 0;border-bottom:1px solid var(--border);">'
      +'<div style="color:#fff;font-size:13px;">'+(i+1)+'. '+escHtml(it.name)+'</div>'
      +'<div style="font-size:12px;color:var(--muted);">'+it.quantity+' × '+it.price_net.toFixed(2)+' = '+lineNet.toFixed(2)+' nettó &nbsp;·&nbsp; ÁFA ('+it.vat_percent+'%): '+afa.toFixed(2)+' &nbsp;·&nbsp; Bruttó: '+brutto.toFixed(2)+'</div></div>';
  }).join('');
  var warn='';
  if(!r.has_plan) warn+='<div style="color:var(--warn);font-size:12px;margin-bottom:8px;">⚠ Nincs előfizetési csomag beállítva ehhez a céghez. Csak HERE tételek kerülnek a számlára.</div>';
  if(!r.has_here) warn+='<div style="color:var(--muted);font-size:12px;margin-bottom:8px;">ℹ Nincs HERE API használat ebben a hónapban.</div>';
  var canIssue = r.provider && (r.items||[]).length;
  b.innerHTML='<h3>🧾 Számla előnézet</h3>'
    +'<div style="color:var(--muted);font-size:13px;margin-bottom:6px;">'+escHtml(r.company_name)+' — '+escHtml(r.month_label)+'</div>'
    +'<div style="font-size:13px;margin-bottom:10px;">Számlázó: <b style="color:#c084fc;">'+escHtml(r.provider_name||r.provider||'—')+'</b> '+(r.provider?'✅':'❌')+'</div>'
    +warn
    +((r.items||[]).length?rows:'<div style="color:var(--muted);padding:10px 0;">Nincs számlázható tétel.</div>')
    +'<div style="margin-top:12px;padding-top:10px;border-top:2px solid var(--border);font-size:13px;">'
    +'<div style="display:flex;justify-content:space-between;"><span>Végösszeg nettó:</span><b>'+r.totals.net.toFixed(2)+' EUR</b></div>'
    +'<div style="display:flex;justify-content:space-between;"><span>Végösszeg ÁFA:</span><b>'+r.totals.vat.toFixed(2)+' EUR</b></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:15px;color:#c084fc;font-weight:800;margin-top:4px;"><span>Végösszeg bruttó:</span><span>'+r.totals.gross.toFixed(2)+' EUR</span></div>'
    +'</div>'
    +'<div style="color:var(--muted);font-size:12px;margin-top:10px;">Fizetési határidő: '+escHtml(r.due_date)+'</div>'
    +(canIssue
       ? '<div style="color:var(--warn);font-size:12px;margin-top:8px;">⚠ Ez a számla a '+escHtml(r.provider_name||r.provider)+' rendszerben kerül kiállításra. A művelet nem visszavonható.</div>'
       : '<div style="color:var(--err);font-size:12px;margin-top:8px;">❌ Nincs aktív számlázó vagy tétel — a kiállítás nem lehetséges.</div>')
    +'<div class="row-btns"><button class="btn-danger-sm" style="flex:1;" onclick="closeInvoiceModal()">❌ Mégsem</button>'
    +(canIssue?'<button class="btn-dev" style="flex:2;" onclick="confirmInvoice()">✅ Kiállítás megerősítése</button>':'')+'</div>';
}
function confirmInvoice(){
  var b=document.getElementById('invoiceModalBody');
  b.innerHTML=_invSpinner('Számla kiállítása folyamatban...');
  gas('generateHereInvoice',[{company_id:_invCompanyId}]).then(function(r){
    if(r&&r.ok){
      _invLastPdf=r.pdf_url||null;
      b.innerHTML='<h3>✅ Számla sikeresen kiállítva!</h3>'
        +'<div style="font-size:14px;margin-bottom:6px;">Számlaszám: <b style="color:#fff;">'+escHtml(r.invoice_number||'—')+'</b></div>'
        +'<div style="font-size:14px;margin-bottom:16px;">Számlázó: <b>'+escHtml(r.provider)+'</b></div>'
        +'<div class="row-btns">'
        +(_invLastPdf?'<button class="btn-dev" style="flex:1;" onclick="window.open(_invLastPdf,\'_blank\')">📄 PDF megnyitása</button>':'')
        +'<button class="btn-danger-sm" style="flex:1;" onclick="closeInvoiceModal()">❌ Bezárás</button></div>';
      loadCompBilling();
    } else {
      b.innerHTML='<h3 style="color:var(--err);">❌ Számla kiállítása sikertelen</h3>'
        +'<div style="font-size:13px;margin-bottom:10px;">Hiba: '+escHtml((r&&r.err)||'ismeretlen')+'</div>'
        +'<div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Ellenőrizd a számlázó integrációt az Integrációk fülön.</div>'
        +'<div class="row-btns"><button class="btn-danger-sm" style="flex:1;" onclick="closeInvoiceModal()">❌ Bezárás</button></div>';
    }
  }).catch(function(){ b.innerHTML=_invErr('Hálózati hiba a kiállításnál.'); });
}

/* ── HERE térkép-szolgáltatások (developer) — 4 szolgáltatás + árszerkesztő + közös pool ── */
var _hereTimer=null;
var HERE_ICONS={autocomplete:'🔍',geocode:'📍',raster_tile:'🗺',routing_truck:'🚛'};
function loadHerePane(){
  loadMapsPricingDev(); loadMapsUsageDev();
  loadHereByCompany();
  gas('getHereServices').then(function(r){
    var tb=document.getElementById('hereTbody'); if(!tb) return;
    if(!r||!r.ok){ tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--err);padding:20px;">Nem elérhető.</td></tr>'; return; }
    tb.innerHTML=(r.services||[]).map(function(s){
      var ic=HERE_ICONS[s.feature_key]||'⚡';
      var k=s.feature_key;
      return '<tr>'
        +'<td><b style="color:#fff;">'+ic+' '+escHtml(s.display_name)+'</b><div style="font-size:11px;color:var(--muted);">'+escHtml(s.description||'')+'</div></td>'
        +'<td><input id="hp_'+k+'" type="number" step="0.01" min="0" value="'+(Number(s.price_eur)||0).toFixed(2)+'" style="width:90px;padding:5px 8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;"> €</td>'

var _detailCegId = null;
var _detailTab   = 'aktivitas';

function openCegDetail(id, nev){
  // A cégnevet a gyorsítótárból keressük ki — nem HTML-attribútumból jön (XSS-védelem)
  if(nev==null){ var c=_cegekCache.find(function(x){return x.id===id;}); nev=c?c.nev:''; }
  _detailCegId = id;
  document.getElementById('detailModalTitle').textContent = '🏢 ' + nev;
  document.getElementById('detailModal').classList.add('open');
  switchDetailTab('aktivitas');
}
function closeDetailModal(){ document.getElementById('detailModal').classList.remove('open'); }

function switchDetailTab(tab){
  _detailTab = tab;
  ['aktivitas','funkciok','hibak'].forEach(function(t){
    document.getElementById('dtab-'+t).style.fontWeight = t===tab ? '800' : '500';
    document.getElementById('dtab-'+t).style.borderBottom = t===tab ? '2px solid #a855f7' : '2px solid transparent';
    document.getElementById('dtab-'+t).style.color = t===tab ? '#fff' : 'var(--muted)';
    document.getElementById('dpane-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if(tab==='aktivitas') loadDetailAktivitas();
  if(tab==='funkciok')  loadDetailFunkciok();
  if(tab==='hibak')     loadDetailHibak();
}

function loadDetailFunkciok(){
  var el=document.getElementById('dpane-funkciok');
  el.innerHTML='<div style="color:var(--muted);padding:20px;text-align:center;"><span class="spinner" style="width:18px;height:18px;display:inline-block;border:2px solid rgba(168,85,247,0.2);border-top-color:#a855f7;border-radius:50%;animation:spin .6s linear infinite;"></span></div>';
  gas('devGetCompanyFeatures',[_detailCegId]).then(function(r){
    if(!r||!r.ok){ el.innerHTML='<div style="color:var(--err);padding:20px;">Hiba a betöltés során.</div>'; return; }
    var feats=r.features||{};
    var cat=window.VS_FEATURES||[];

    cat.forEach(function(f){ if(!groups[f.group]){groups[f.group]=[];order.push(f.group);} groups[f.group].push(f); });
    var html='<div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5;">Kapcsold ki/be az egyes menüpontokat ennél a cégnél. A <b>kikapcsolt</b> funkció nem jelenik meg a cég felületén. Alapból minden be van kapcsolva.</div>';
    order.forEach(function(g){
      html+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#c084fc;margin:16px 0 8px;">'+escHtml(g)+'</div>';
      groups[g].forEach(function(f){
        // optIn kulcs: alapból KI (csak explicit enabled=true kapcsol be);

        html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,0.02);">'
          +'<span style="font-size:13px;color:#fff;">'+escHtml(f.label)+(f.core?' <span style="color:var(--muted);font-size:11px;">(alap)</span>':'')+'</span>'
          + right + '</div>';
      });
    });
    el.innerHTML=html;
  });

function toggleFeature(cid,key,enabled,inp){
  inp.disabled=true;

        +'</div>'
        +(b.is_read ? '<span style="font-size:10px;color:var(--muted);">✓ olvasva</span>'
          : '<button onclick="markRead('+b.id+')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid rgba(168,85,247,0.4);background:rgba(168,85,247,0.1);color:#c084fc;cursor:pointer;font-weight:600;">✓ Olvasott</button>')
        +'</div>'
        +'<div style="font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;">'+escHtml(b.szoveg)+'</div>'
        +'</div>';
    }).join('');
  });
}

// HTML-escape — idézőjeleket is escape-eli, hogy attribútumban is biztonságos legyen
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

function markRead(id){
  gas('markBugRead',[id]).then(function(r){
    if(r&&r.ok){
      var el=document.getElementById('bug-'+id);
      if(el){
        el.style.background='rgba(255,255,255,0.02)';
        el.style.border='1px solid var(--border)';
        var btn=el.querySelector('button');
        if(btn){ btn.outerHTML='<span style="font-size:10px;color:var(--muted);">✓ olvasva</span>'; }
      }
      loadCegek(); // frissíti a badge-et
    }
  });
}

function loadUsers(){
  gas('devUserList').then(function(list){
    if(!list||!list.length){document.getElementById('devUserTbody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">Nincs felhasználó.</td></tr>';return;}
    document.getElementById('devUserTbody').innerHTML = list.map(function(u){
      var em = String(u.email||'').replace(/'/g,"\\'");
      var statusBadge = u.is_dev ? '<span class="status-badge cancelled">Developer</span>'
        : (u.blocked ? '<span class="status-badge inactive">Tiltva</span>' : '<span class="status-badge active">Aktív</span>');
      var actions;
      if(u.is_dev){ actions='<span style="color:var(--muted);font-size:11px;">— védett —</span>'; }
      else {
        actions = (u.blocked
            ? '<button class="btn-ok-sm" onclick="devUnblock('+u.id+',\''+em+'\')">🔓 Feloldás</button>'
            : '<button class="btn-danger-sm" onclick="devBlock('+u.id+',\''+em+'\')">🔒 Blokk</button>')
          + ' <button class="btn-danger-sm" onclick="devDelUser('+u.id+',\''+em+'\')" style="background:rgba(239,68,68,0.18);">🗑 Töröl</button>';
      }
      return '<tr><td>'+escHtml(u.nume||'')+'</td><td>'+escHtml(u.email||'')+'</td>'
        +'<td><span class="status-badge active">'+escHtml(u.pozicio||'')+'</span></td>'
        +'<td>'+escHtml(u.ceg_nev||'—')+'</td><td>'+statusBadge+'</td><td>'+actions+'</td></tr>';
    }).join('');
  });
}
function devBlock(id,email){
  if(!confirm('Biztosan LETILTOD ezt a felhasználót?\n\n'+email+'\n\nEzután nem fog tudni bejelentkezni.')) return;
  gas('devUserSetBlocked',[id,true]).then(function(r){ if(r&&r.ok){toast('Felhasználó letiltva','ok');loadUsers();}else{toast((r&&r.err)||'Hiba','err');} });
}
function devUnblock(id,email){
  if(!confirm('Feloldod a tiltást?\n\n'+email)) return;
  gas('devUserSetBlocked',[id,false]).then(function(r){ if(r&&r.ok){toast('Tiltás feloldva','ok');loadUsers();}else{toast((r&&r.err)||'Hiba','err');} });
}
function devDelUser(id,email){
  if(!confirm('⚠️ VÉGLEGES TÖRLÉS\n\n'+email+'\n\nA felhasználó és személyes adatai (menetlevelek, dokumentumok, aláírás) törlődnek. Biztos vagy benne?')) return;
  if(!confirm('Utolsó megerősítés — ez NEM vonható vissza.\n\nTényleg törlöd: '+email+' ?')) return;
  gas('devUserDelete',[id]).then(function(r){ if(r&&r.ok){toast('Felhasználó törölve','ok');loadUsers();}else{toast((r&&r.err)||'Hiba','err');} });
}

function openNewCeg(){
  document.getElementById('cegModalTitle').textContent = 'Új cég létrehozása';
  document.getElementById('cegId').value = '';
  document.getElementById('cegNev').value = '';
  document.getElementById('cegIgazgato').value = '';
  document.getElementById('cegEmail').value = '';
  document.getElementById('cegTel').value = '';
  document.getElementById('cegMaxUsers').value = 10;
  document.getElementById('cegMaxTrucks').value = 10;
  document.getElementById('cegStatus').value = 'active';
  document.getElementById('cegPaidUntil').value = '';
  document.getElementById('cegModal').classList.add('open');
}

function openEditCeg(c){
  document.getElementById('cegModalTitle').textContent = 'Cég szerkesztése';
  document.getElementById('cegId').value = c.id;
  document.getElementById('cegNev').value = c.nev||'';
  document.getElementById('cegIgazgato').value = c.igazgato_nev||'';
  document.getElementById('cegEmail').value = c.email_contact||'';
  document.getElementById('cegTel').value = c.telefon||'';
  document.getElementById('cegMaxUsers').value = c.max_users||10;
  document.getElementById('cegMaxTrucks').value = c.max_trucks||10;
  document.getElementById('cegStatus').value = c.subscription_status||'active';
  document.getElementById('cegPaidUntil').value = c.paid_until ? c.paid_until.substring(0,10) : '';
  document.getElementById('cegModal').classList.add('open');
}

function closeCegModal(){ document.getElementById('cegModal').classList.remove('open'); }

function saveCeg(){
  var id = document.getElementById('cegId').value;
  var email = document.getElementById('cegEmail').value.trim();
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    toast('Érvénytelen email cím!','err'); return;
  }
  var f = {
    nev: document.getElementById('cegNev').value.trim(),
    igazgato_nev: document.getElementById('cegIgazgato').value.trim(),
    email_contact: email,
    telefon: document.getElementById('cegTel').value.trim(),
    max_users: document.getElementById('cegMaxUsers').value,
    max_trucks: document.getElementById('cegMaxTrucks').value,
    subscription_status: document.getElementById('cegStatus').value,
    paid_until: document.getElementById('cegPaidUntil').value || null
  };
  if(!f.nev){toast('A cég neve kötelező!','err');return;}
  var fn = id ? 'devCompanyUpdate' : 'devCompanyCreate';
  var args = id ? [parseInt(id), f] : [f];
  gas(fn, args).then(function(r){
    if(r&&r.ok){
      closeCegModal(); loadCegek(); loadDash();
      if(r.invite_kod){
        alert('✅ Cég létrehozva!\n\nAdmin meghívókód: ' + r.invite_kod + '\n\n' + (email ? 'Az email el lett küldve: ' + email : 'Add át az ügyfélnek ezt a kódot.'));
      } else {
        toast('Mentve!','ok');
      }
    } else { toast(r&&r.err||'Hiba','err'); }
  });
}

function deleteCeg(id, nev){
  // A cégnevet a gyorsítótárból keressük ki — nem HTML-attribútumból jön (XSS-védelem)
  if(nev==null){ var c=_cegekCache.find(function(x){return x.id===id;}); nev=c?c.nev:''; }
  var kod = prompt('⚠️ FIGYELEM: Ez törli a céget és MINDEN hozzátartozó adatot!\n\nCég: ' + nev + '\n\nA törlés megerősítéséhez írd be:\nvallorsoftcegtorlo1');
  if(kod === null) return;
  if(kod !== 'vallorsoftcegtorlo1'){toast('Helytelen megerősítő kód!','err');return;}
  gas('devCompanyDelete',[id, kod]).then(function(r){
    if(r&&r.ok){toast('Cég törölve!','ok');loadCegek();loadDash();}
    else{toast(r&&r.err||'Hiba','err');}
  });
}

function blockCeg(id){
  if(!confirm('Biztosan blokkolod ezt a céget? A felhasználók nem tudnak bejelentkezni.')) return;
  gas('devCompanyUpdate',[id,{subscription_status:'inactive'}]).then(function(r){
    if(r&&r.ok){toast('Cég blokkolva!','ok');loadCegek();}else{toast(r&&r.err||'Hiba','err');}
  });
}

function unblockCeg(id){
  gas('devCompanyUpdate',[id,{subscription_status:'active'}]).then(function(r){
    if(r&&r.ok){toast('Cég aktiválva!','ok');loadCegek();}else{toast(r&&r.err||'Hiba','err');}
  });
}

function logout(){
  gas('authLogout').then(function(){window.location.href='/login';});
}

// INIT
gas('authMe').then(function(u){
  if(!u||!u.is_dev){window.location.href='/login';return;}
  document.getElementById('devBadge').textContent = u.nume;
  loadDash();
});

/* ── Developer mobil sidebar ── */
function devToggleSidebar() {
  var sb = document.getElementById('devSidebar');
  var ov = document.getElementById('devSidebarOverlay');
  sb.classList.toggle('mob-open');
  ov.classList.toggle('open');
  document.body.style.overflow = sb.classList.contains('mob-open') ? 'hidden' : '';
}
function devCloseSidebar() {
  document.getElementById('devSidebar').classList.remove('mob-open');
  document.getElementById('devSidebarOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
// Tab kattintasra bezarul
document.querySelectorAll('.dev-tab').forEach(function(el) {
  el.addEventListener('click', function() {
    if (window.innerWidth <= 768) devCloseSidebar();
  });
});

</script>
</body>
</html>
