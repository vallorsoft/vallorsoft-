<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="trk.title">Urmărire transport</title>
  <script src="/i18n.js?v=20260618navi"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    /* Publikus, önálló oldal — prémium világos „landing" stílus (nincs app-CSS függés) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; min-height: 100vh; color: #0f172a;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(900px 500px at 85% -8%, rgba(99,102,241,.10), transparent),
        radial-gradient(800px 480px at 0% 0%, rgba(59,130,246,.08), transparent),
        #f7f9fc;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px; }
    .logo { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: #0f172a; }
    .logo .red { color: #6366f1; }
    .ceg { color: #64748b; font-size: 13px; margin-bottom: 20px; }
    .card {
      position: relative; background: linear-gradient(180deg, #ffffff, #fbfcfe);
      border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-bottom: 14px;
      box-shadow: 0 4px 12px rgba(15,23,42,.06), 0 10px 28px rgba(15,23,42,.06);
    }
    .card::before {
      content: ""; position: absolute; inset: 0 0 auto 0; height: 1px; border-radius: 16px 16px 0 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.9), transparent); pointer-events: none;
    }
    .route { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 16px; font-weight: 700; }
    .route .arrow { color: #94a3b8; }
    .meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 16px; }
    .meta .l { font-size: 11px; color: #64748b; margin-bottom: 2px; }
    .meta .v { font-size: 14px; font-weight: 600; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 1px solid; }
    .b-ok { background: linear-gradient(180deg, rgba(34,197,94,.14), rgba(34,197,94,.08)); color: #15803d; border-color: rgba(34,197,94,.32); }
    .b-warn { background: linear-gradient(180deg, rgba(245,158,11,.16), rgba(245,158,11,.08)); color: #b45309; border-color: rgba(245,158,11,.34); }
    .b-info { background: linear-gradient(180deg, rgba(59,130,246,.14), rgba(59,130,246,.07)); color: #1d4ed8; border-color: rgba(59,130,246,.30); }
    #map { height: 380px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 12px rgba(15,23,42,.06); }
    .muted { color: #64748b; font-size: 13px; }
    .extbtn { display: inline-block; text-decoration: none; font-weight: 700; font-size: 14px;
      color: #fff; background: linear-gradient(180deg, #6366f1, #4f46e5);
      padding: 11px 22px; border-radius: 10px; box-shadow: 0 4px 12px rgba(79,70,229,.25); }
    .err { text-align: center; padding: 60px 20px; }
    .foot { text-align: center; color: #94a3b8; font-size: 11px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">vallor<span class="red">Soft</span></div>
  <div class="ceg" id="ceg" data-i18n="trk.title">Urmărire transport</div>
  <div id="content"><div class="card muted" style="text-align:center;" data-i18n="common.loading">Se încarcă…</div></div>
  <div class="foot" data-i18n="trk.foot">Pagina de urmărire este generată de transportator. · VallorSoft</div>
</div>
<script>
(function () {
  var token = location.pathname.split('/').pop();
  // Státusz-kód → [css-osztály, fordítási kulcs]
  var STATUS = {
    'Disponibil': ['b-info', 'trk.stRegistered'],
    'Alocat':     ['b-warn', 'trk.stScheduled'],
    'Extern':     ['b-warn', 'trk.stScheduled'],
    'In Curs':    ['b-info', 'trk.stInTransit'],
    'Finalizat':  ['b-ok',   'trk.stDelivered'],
    'Anulat':     ['b-warn', 'trk.stCancelled']
  };
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function d(x) { return x ? new Date(x).toLocaleDateString('ro-RO') : '—'; }
  var _last = null; // utolsó válasz a nyelvváltáskori újrarendereléshez

  function render(r) {
    var box = document.getElementById('content');
    if (!r || !r.ok) {
      box.innerHTML = '<div class="card err"><div style="font-size:40px;margin-bottom:12px;">🔍</div>'
        + '<b>' + esc(t('trk.invalidLink')) + '</b><div class="muted" style="margin-top:6px;">' + esc(t('trk.contactCarrier')) + '</div></div>';
      return;
    }
    var tr = r.transport;
    document.getElementById('ceg').textContent = (tr.ceg || '') + ' — ' + t('trk.titleLower');
    var st = STATUS[tr.status] || ['b-info', null];
    var stLabel = st[1] ? t(st[1]) : tr.status;
    box.innerHTML =
      '<div class="card">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;">'
      + '<span class="muted">' + esc(t('trk.transport')) + ' <b style="color:#0f172a;">' + esc(tr.ref) + '</b></span>'
      + '<span class="badge ' + st[0] + '">' + esc(stLabel) + '</span></div>'
      + '<div class="route"><span>📦 ' + esc(tr.loc_incarcare || '—') + '</span><span class="arrow">→</span><span>🏁 ' + esc(tr.loc_descarcare || '—') + '</span></div>'
      + '<div class="meta">'
      + '<div><div class="l">' + esc(t('trk.loadDate')) + '</div><div class="v">' + d(tr.data_incarcare) + '</div></div>'
      + '<div><div class="l">' + esc(t('trk.unloadDate')) + '</div><div class="v">' + d(tr.data_descarcare) + '</div></div>'
      + '<div><div class="l">' + esc(t('trk.vehicle')) + '</div><div class="v">' + esc(tr.rendszam || '—') + '</div></div>'
      + '</div></div>'
    // Térkép: van élő GPS → autó pozíció; nincs, de van geokódolt útvonal →
    // tervezett útvonal (felrakó → lerakó); egyik sincs → szöveges jelzés.
    var hasRoute = r.route && (r.route.from || r.route.to);
    if (r.position) {
      box.innerHTML += '<div id="map"></div><div class="muted" style="margin-top:8px;text-align:right;">' + esc(t('trk.posUpdated')) + ' '
        + (r.position.datetime ? new Date(r.position.datetime).toLocaleString('ro-RO') : '—')
        + ' · ' + esc(t('trk.autoReload')) + '</div>';
    } else if (hasRoute) {
      box.innerHTML += '<div id="map"></div><div class="muted" style="margin-top:8px;text-align:center;">📍 ' + esc(t('trk.noGps'))
        + (tr.status === 'Finalizat' ? ' — ' + esc(t('trk.deliveredNote')) + ' ✅' : '') + '</div>';
    } else {
      box.innerHTML += '<div class="card muted" style="text-align:center;">📍 ' + esc(t('trk.noGps'))
        + (tr.status === 'Finalizat' ? ' — ' + esc(t('trk.deliveredNote')) + ' ✅' : '.') + '</div>';
    }

    // Alvállalkozói külső követő-link (megosztott URL) — gombként.
    if (r.external_url && /^https?:\/\//i.test(r.external_url)) {
      box.innerHTML += '<div style="text-align:center;margin-top:12px;">'
        + '<a class="extbtn" href="' + esc(r.external_url).replace(/"/g, '&quot;') + '" target="_blank" rel="noopener noreferrer">🛰️ '
        + esc(t('trk.externalTrack')) + '</a></div>';
    }

    if (typeof L === 'undefined' || !document.getElementById('map')) return;
    var map = L.map('map');
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      { attribution: '© OpenStreetMap © CARTO', maxZoom: 19, subdomains: 'abcd' }).addTo(map);

    if (r.position) {
      map.setView([r.position.lat, r.position.lng], 9);
      var m = L.circleMarker([r.position.lat, r.position.lng],
        { radius: 10, color: '#6366f1', fillColor: '#6366f1', fillOpacity: 0.9, weight: 3 }).addTo(map);
      m.bindTooltip('🚛 ' + (tr.rendszam || '') + (r.position.speed != null ? ' · ' + Math.round(r.position.speed) + ' km/h' : '')).openTooltip();
    } else {
      // Tervezett útvonal: felrakó (zöld) → lerakó (piros) + összekötő vonal.
      var pts = [];
      if (r.route.from) {
        L.circleMarker([r.route.from.lat, r.route.from.lng],
          { radius: 9, color: '#16a34a', fillColor: '#16a34a', fillOpacity: 0.9, weight: 3 }).addTo(map)
          .bindTooltip('📦 ' + esc(tr.loc_incarcare || r.route.from.label || ''));
        pts.push([r.route.from.lat, r.route.from.lng]);
      }
      if (r.route.to) {
        L.circleMarker([r.route.to.lat, r.route.to.lng],
          { radius: 9, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.9, weight: 3 }).addTo(map)
          .bindTooltip('🏁 ' + esc(tr.loc_descarcare || r.route.to.label || ''));
        pts.push([r.route.to.lat, r.route.to.lng]);
      }
      if (pts.length === 2) {
        L.polyline(pts, { color: '#6366f1', weight: 3, opacity: 0.7, dashArray: '6,8' }).addTo(map);
        map.fitBounds(pts, { padding: [40, 40] });
      } else if (pts.length === 1) {
        map.setView(pts[0], 8);
      }
    }
  }

  function load() {
    fetch('/api/track/' + encodeURIComponent(token))
      .then(function (r) { return r.json(); })
      .then(function (r) { _last = r; render(r); })
      .catch(function () {
        document.getElementById('content').innerHTML = '<div class="card err">' + esc(t('common.connError')) + '</div>';
      });
  }
  // Nyelvváltáskor az utolsó adatból újrarenderelünk
  window.onLangChange = function () { if (_last) render(_last); };
  load();
  setInterval(load, 2 * 60 * 1000); // 2 percenként frissül (a szerver 60s-ig cache-el)
})();
</script>
</body>
</html>
